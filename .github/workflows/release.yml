name: Release

on:
  release:
    types:
      - published

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node -e "const pkg = require('./package.json'); const tag = process.env.RELEASE_TAG.replace(/^v/, ''); if (pkg.version !== tag) { console.error(`Release tag ${process.env.RELEASE_TAG} does not match package.json version ${pkg.version}`); process.exit(1); }"

      - name: Run tests
        run: bun test

      - name: Run typecheck
        run: bun run typecheck

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
